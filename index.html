<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VLM Mathématiques — Banque d'exercices</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');

    :root {
      --blue:    #1a5aa0;
      --blue-lt: #e8f0fb;
      --green:   #0a7c50;
      --green-lt:#e6f4ef;
      --gray:    #f5f6f8;
      --border:  #dde2ea;
      --text:    #1c2333;
      --muted:   #6b7a99;
      --diff1: #27ae60; --diff2: #f39c12; --diff3: #e74c3c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--gray); color: var(--text); }

    /* ── Header ── */
    header {
      background: var(--blue);
      color: white;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    header .logo { font-family: 'Source Serif 4', serif; font-size: 1.8rem; font-weight: 700; }
    header .subtitle { font-size: .9rem; opacity: .8; margin-top: .15rem; }
    header nav { margin-left: auto; display: flex; gap: 1rem; }
    header nav a {
      color: white; text-decoration: none; font-size: .85rem; opacity: .85;
      border: 1px solid rgba(255,255,255,.35); border-radius: 6px;
      padding: .4rem .9rem; transition: opacity .15s, background .15s;
    }
    header nav a:hover { opacity: 1; background: rgba(255,255,255,.15); }

    /* ── Layout ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: 260px 1fr; gap: 1.5rem; }

    /* ── Sidebar filtres ── */
    .sidebar { display: flex; flex-direction: column; gap: 1rem; }
    .card { background: white; border-radius: 10px; border: 1px solid var(--border); padding: 1.2rem; }
    .card h3 { font-size: .8rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: .8rem; }

    .search-box { position: relative; }
    .search-box input {
      width: 100%; padding: .6rem 2.2rem .6rem .9rem;
      border: 1px solid var(--border); border-radius: 8px;
      font-family: inherit; font-size: .9rem; color: var(--text);
      transition: border-color .15s;
    }
    .search-box input:focus { outline: none; border-color: var(--blue); }
    .search-box::after { content: "⌕"; position: absolute; right: .7rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1.1rem; pointer-events: none; }

    .filter-group { display: flex; flex-direction: column; gap: .4rem; }
    .filter-btn {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: .45rem .8rem; text-align: left; cursor: pointer;
      font-family: inherit; font-size: .85rem; color: var(--text);
      transition: all .15s; display: flex; justify-content: space-between; align-items: center;
    }
    .filter-btn:hover { border-color: var(--blue); color: var(--blue); }
    .filter-btn.active { background: var(--blue-lt); border-color: var(--blue); color: var(--blue); font-weight: 600; }
    .filter-btn .count { font-size: .75rem; opacity: .6; }

    .tag-cloud { display: flex; flex-wrap: wrap; gap: .4rem; }
    .tag {
      background: var(--gray); border: 1px solid var(--border); border-radius: 20px;
      padding: .3rem .75rem; font-size: .78rem; cursor: pointer; transition: all .15s;
    }
    .tag:hover { border-color: var(--blue); color: var(--blue); }
    .tag.active { background: var(--blue); border-color: var(--blue); color: white; }

    /* ── Résultats ── */
    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .results-header h2 { font-family: 'Source Serif 4', serif; font-size: 1.3rem; }
    .results-count { font-size: .85rem; color: var(--muted); }

    .exercise-list { display: flex; flex-direction: column; gap: .75rem; }

    .exercise-card {
      background: white; border: 1px solid var(--border); border-radius: 10px;
      padding: 1.1rem 1.3rem; cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
    }
    .exercise-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,.08); border-color: var(--blue); }
    .exercise-card.expanded { border-color: var(--blue); box-shadow: 0 3px 14px rgba(26,90,160,.12); }

    .ex-header { display: flex; align-items: flex-start; gap: .8rem; }
    .ex-id { font-family: 'JetBrains Mono', monospace; font-size: .75rem; color: var(--muted); white-space: nowrap; margin-top: .15rem; }
    .ex-title { font-family: 'Source Serif 4', serif; font-size: 1.05rem; font-weight: 600; flex: 1; }
    .ex-meta { display: flex; align-items: center; gap: .6rem; margin-left: auto; flex-shrink: 0; }

    .badge {
      border-radius: 5px; padding: .2rem .55rem; font-size: .72rem; font-weight: 600;
    }
    .badge-chapitre { background: var(--blue-lt); color: var(--blue); }
    .badge-niveau { background: #eef; color: #445; }
    .diff-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

    .ex-footer { display: flex; align-items: center; gap: .5rem; margin-top: .6rem; flex-wrap: wrap; }
    .ex-tag { background: var(--gray); border-radius: 20px; padding: .2rem .6rem; font-size: .73rem; color: var(--muted); }

    .ex-body { margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed var(--border); display: none; }
    .exercise-card.expanded .ex-body { display: block; }

    .latex-preview {
      background: var(--gray); border-radius: 8px; padding: 1rem;
      font-family: 'JetBrains Mono', monospace; font-size: .8rem;
      color: #334; overflow-x: auto; white-space: pre-wrap; word-break: break-word;
    }

    .copy-btn {
      margin-top: .75rem; background: var(--blue); color: white; border: none;
      border-radius: 7px; padding: .5rem 1.1rem; font-size: .82rem; font-family: inherit;
      cursor: pointer; display: flex; align-items: center; gap: .4rem;
      transition: background .15s;
    }
    .copy-btn:hover { background: #154a87; }
    .copy-btn.copied { background: var(--green); }

    .empty-state { text-align: center; padding: 3rem; color: var(--muted); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; padding: 1rem; }
      header { flex-wrap: wrap; gap: .75rem; }
      header nav { margin-left: 0; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">VLM Mathématiques</div>
    <div class="subtitle">Banque d'exercices — Édition 2025</div>
  </div>
  <nav>
    <a href="pdfs/vlm-eleve.pdf" target="_blank">📄 PDF Élève</a>
    <a href="pdfs/vlm-corrige.pdf" target="_blank">✅ PDF Corrigé</a>
  </nav>
</header>

<div class="container">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <div class="card">
      <h3>Recherche</h3>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Ex: discriminant, cercle…">
      </div>
    </div>

    <div class="card">
      <h3>Chapitre</h3>
      <div class="filter-group" id="chapitreFilters"></div>
    </div>

    <div class="card">
      <h3>Difficulté</h3>
      <div class="filter-group">
        <button class="filter-btn active" data-filter="diff" data-value="">Toutes</button>
        <button class="filter-btn" data-filter="diff" data-value="1">
          ● Facile
        </button>
        <button class="filter-btn" data-filter="diff" data-value="2">
          ●● Moyen
        </button>
        <button class="filter-btn" data-filter="diff" data-value="3">
          ●●● Difficile
        </button>
      </div>
    </div>

    <div class="card">
      <h3>Tags</h3>
      <div class="tag-cloud" id="tagCloud"></div>
    </div>

  </aside>

  <!-- ── Résultats ── -->
  <main>
    <div class="results-header">
      <h2>Exercices</h2>
      <span class="results-count" id="resultsCount"></span>
    </div>
    <div class="exercise-list" id="exerciseList"></div>
  </main>

</div>

<script>
// ── Données (chargées depuis exercices.json) ──────────────────
let allExercises = [];
let activeFilters = { chapitre: "", diff: "", tags: new Set(), search: "" };

async function loadData() {
  try {
    const res = await fetch("exercices.json");
    allExercises = await res.json();
  } catch {
    // Données de démo si le JSON n'existe pas encore
    allExercises = [
      {
        id: "EX-CH01-001", titre: "Résolution d'équation du second degré",
        chapitre: 1, chapitre_nom: "Algèbre", section: "Équations",
        niveau: "secondaire2", difficulte: 2, auteur: "Dupont M.", annee: 2025,
        tags: ["équation", "second-degré", "discriminant", "algèbre"],
        objectifs: ["Calculer le discriminant", "Trouver les racines d'un trinôme"],
        latex_exercice: "\\begin{exercice}{EX-CH01-001}{...}\nRésoudre dans $\\mathbb{R}$ :\n  a) $2x^2 - 5x + 3 = 0$\n  b) $x^2 + 4x + 5 = 0$\n\\end{exercice}"
      },
      {
        id: "EX-CH03-007", titre: "Valeurs exactes du cercle trigonométrique",
        chapitre: 3, chapitre_nom: "Trigonométrie", section: "Cercle trigonométrique",
        niveau: "secondaire2", difficulte: 1, auteur: "Martin S.", annee: 2025,
        tags: ["trigonométrie", "cercle", "sin", "cos", "valeurs-exactes", "radians"],
        objectifs: ["Lire le cercle trigonométrique", "Convertir degrés et radians"],
        latex_exercice: "\\begin{exercice}{EX-CH03-007}{...}\nDonner les valeurs exactes de $\\sin(\\pi/6)$, $\\cos(\\pi/4)$…\n\\end{exercice}"
      }
    ];
  }
  buildUI();
  render();
}

// ── Construction des filtres dynamiques ───────────────────────
function buildUI() {
  // Chapitres
  const chapitres = [...new Map(allExercises.map(e => [e.chapitre, e.chapitre_nom])).entries()]
    .sort((a, b) => a[0] - b[0]);
  const chapContainer = document.getElementById("chapitreFilters");
  chapContainer.innerHTML = `<button class="filter-btn active" data-filter="chapitre" data-value="">Tous</button>`;
  chapitres.forEach(([num, nom]) => {
    const count = allExercises.filter(e => e.chapitre === num).length;
    chapContainer.innerHTML += `<button class="filter-btn" data-filter="chapitre" data-value="${num}">${num}. ${nom}<span class="count">${count}</span></button>`;
  });

  // Tags
  const tagCount = {};
  allExercises.forEach(e => e.tags.forEach(t => tagCount[t] = (tagCount[t] || 0) + 1));
  const tagCloud = document.getElementById("tagCloud");
  Object.entries(tagCount).sort((a,b) => b[1]-a[1]).forEach(([tag]) => {
    tagCloud.innerHTML += `<span class="tag" data-tag="${tag}">${tag}</span>`;
  });
}

// ── Logique de filtrage ───────────────────────────────────────
function filterExercises() {
  return allExercises.filter(e => {
    if (activeFilters.chapitre && e.chapitre != activeFilters.chapitre) return false;
    if (activeFilters.diff     && e.difficulte != activeFilters.diff)   return false;
    if (activeFilters.tags.size > 0 && ![...activeFilters.tags].every(t => e.tags.includes(t))) return false;
    if (activeFilters.search) {
      const q = activeFilters.search.toLowerCase();
      if (!e.titre.toLowerCase().includes(q) &&
          !e.tags.some(t => t.toLowerCase().includes(q)) &&
          !e.section?.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

// ── Rendu ─────────────────────────────────────────────────────
function diffColor(d) { return ["", "var(--diff1)", "var(--diff2)", "var(--diff3)"][d] || "#999"; }

function render() {
  const filtered = filterExercises();
  document.getElementById("resultsCount").textContent = `${filtered.length} exercice${filtered.length > 1 ? "s" : ""}`;

  const list = document.getElementById("exerciseList");
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>Aucun exercice trouvé pour ces critères.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(e => `
    <div class="exercise-card" data-id="${e.id}">
      <div class="ex-header">
        <span class="ex-id">${e.id}</span>
        <span class="ex-title">${e.titre}</span>
        <div class="ex-meta">
          <span class="badge badge-chapitre">Ch. ${e.chapitre}</span>
          <span class="diff-dot" title="Difficulté ${e.difficulte}/3" style="background:${diffColor(e.difficulte)}"></span>
        </div>
      </div>
      <div class="ex-footer">
        ${e.tags.map(t => `<span class="ex-tag">${t}</span>`).join("")}
        <span style="margin-left:auto;font-size:.75rem;color:var(--muted)">${e.auteur} · ${e.annee}</span>
      </div>
      <div class="ex-body">
        <div style="font-size:.82rem;color:var(--muted);margin-bottom:.5rem">
          🎯 ${e.objectifs?.join(" · ") || ""}
        </div>
        <div class="latex-preview">${escHtml(e.latex_exercice)}</div>
        <button class="copy-btn" onclick="copyLatex(event, '${e.id}')">
          📋 Copier le LaTeX
        </button>
      </div>
    </div>
  `).join("");

  // Expand/collapse
  list.querySelectorAll(".exercise-card").forEach(card => {
    card.addEventListener("click", e => {
      if (e.target.classList.contains("copy-btn")) return;
      card.classList.toggle("expanded");
    });
  });
}

function escHtml(str) {
  return (str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function copyLatex(e, id) {
  e.stopPropagation();
  const ex = allExercises.find(x => x.id === id);
  if (!ex) return;
  await navigator.clipboard.writeText(ex.latex_exercice);
  const btn = e.target;
  btn.textContent = "✅ Copié !";
  btn.classList.add("copied");
  setTimeout(() => { btn.textContent = "📋 Copier le LaTeX"; btn.classList.remove("copied"); }, 2000);
}

// ── Event listeners ───────────────────────────────────────────
document.addEventListener("click", e => {
  // Filtres boutons
  const btn = e.target.closest(".filter-btn");
  if (btn) {
    const filter = btn.dataset.filter;
    document.querySelectorAll(`[data-filter="${filter}"]`).forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilters[filter] = btn.dataset.value;
    render();
  }
  // Tags
  const tag = e.target.closest(".tag");
  if (tag) {
    tag.classList.toggle("active");
    const t = tag.dataset.tag;
    activeFilters.tags.has(t) ? activeFilters.tags.delete(t) : activeFilters.tags.add(t);
    render();
  }
});

document.getElementById("searchInput").addEventListener("input", e => {
  activeFilters.search = e.target.value.trim();
  render();
});

loadData();
</script>
</body>
</html>
